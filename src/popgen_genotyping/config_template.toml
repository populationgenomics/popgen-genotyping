# this is a template for the config file
# demonstrating some of the common options used in cpg-flow
[workflow]

# TODO(you): update this to reflect the workflow's name
name = 'popgen_genotyping'

# mandatory fields for cpg-flow, not populated by analysis-runner
dataset = 'ourdna'
input_cohorts = []
sequencing_type = 'array'

# used to make sure we don't repeat previously completed stages
check_expected_outputs = true

# the method to register outputs, can be missing - will not generate metamist analysis entries
status_reporter = 'metamist'

driver_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/cpg_flow:latest'
bcftools_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/bcftools:1.23-1'
plink_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/plink:1.9-20250819-PLINK-2.0-20260228-1'
king_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/king:2.3.2-1'
version = 1

[popgen_genotyping.gtc_to_bcfs]
cpu = 2
memory = 'standard'
storage = '50G'

[popgen_genotyping.baf_regress]
cpu = 1
memory = 'standard'
storage = '10G'

[popgen_genotyping.cohort_cluster_stats]
cpu = 2
memory = 'standard'
storage = '30G'

[popgen_genotyping.cohort_bcf_to_plink]
cpu = 8
memory = 'highmem'
storage = '50G'

[popgen_genotyping.cohort_plink_qc]
cpu = 2
memory = 'standard'
storage = '20G'

[popgen_genotyping.merge_cohort_plink]
cpu = 4
memory = 'highmem'
storage = '100G'
# The Metamist analysis ID of the previous multi-cohort aggregate
# previous_analysis_id = 123456

[popgen_genotyping.export_cohort_datasets]
cpu = 2
memory = 'standard'
storage = '50G'

[popgen_genotyping.plink2_qc]
cpu = 2
memory = 'standard'
storage = '20G'

[popgen_genotyping.king_ibdseg]
cpu = 8
memory = 'highmem'
storage = '50G'

[popgen_genotyping.qc_report]
cpu = 2
memory = 'standard'
storage = '20G'

[popgen_genotyping.snp_qc_report]
cpu = 4
memory = 'highmem'
storage = '50G'

# Resources for the bcftools EGT-INFO extract sub-job (Job 1 of SnpQcReport).
# Tiny job; defaults are fine but exposed for parity.
[popgen_genotyping.snp_qc_report.extract]
cpu = 1
memory = 'standard'
storage = '10G'

[popgen_genotyping.snp_qc_report.thresholds]
gentrain_score_min = 0.7
cluster_sep_min = 0.4
vmiss_max = 0.02
hwe_p_min = 1e-6
call_rate_range_max = 0.05
af_chi2_p_min = 1e-6
egt_centroid_delta_max = 0.1
cluster_icc_max = 0.5
cluster_spread_max = 0.01
cluster_separation_min = 0.15

[popgen_genotyping.references]
fasta_ref_path = 'gs://cpg-common-main/references/hg38/v0/Homo_sapiens_assembly38.fasta'
bpm_manifest_path = 'gs://...'
egt_cluster_path = 'gs://...'
# Optional: population allele frequency reference for BAFRegress
# af_ref_path = 'gs://...'

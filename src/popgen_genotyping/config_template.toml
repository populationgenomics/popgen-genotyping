# this is a template for the config file
# demonstrating some of the common options used in cpg-flow
[workflow]

# TODO(you): update this to reflect the workflow's name
name = 'popgen_genotyping'

# mandatory fields for cpg-flow, not populated by analysis-runner
dataset = 'ourdna'
input_cohorts = []
sequencing_type = 'array'

# used to make sure we don't repeat previously completed stages
check_expected_outputs = true

# the method to register outputs, can be missing - will not generate metamist analysis entries
status_reporter = 'metamist'

driver_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/cpg_flow:latest'
bcftools_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/bcftools:1.23-1'
plink_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/plink:1.9-20250819-PLINK-2.0-20260228-1'
king_image = 'australia-southeast1-docker.pkg.dev/cpg-common/images/king:2.3.2-1'
version = 1

[popgen_genotyping.gtc_to_bcfs]
cpu = 2
memory = 'standard'
storage = '50G'

[popgen_genotyping.baf_regress]
cpu = 1
memory = 'standard'
storage = '10G'

[popgen_genotyping.cohort_bcf_to_plink]
cpu = 8
memory = 'highmem'
storage = '50G'

[popgen_genotyping.merge_cohort_plink]
cpu = 4
memory = 'highmem'
storage = '100G'
# The Metamist analysis ID of the previous multi-cohort aggregate
# previous_analysis_id = 123456

[popgen_genotyping.export_cohort_datasets]
cpu = 2
memory = 'standard'
storage = '50G'

[popgen_genotyping.plink2_qc]
cpu = 2
memory = 'standard'
storage = '20G'

[popgen_genotyping.king_ibdseg]
cpu = 8
memory = 'highmem'
storage = '50G'

[popgen_genotyping.merge_with_reference_panel]
cpu = 4
memory = 'highmem'
storage = '100G'

[popgen_genotyping.qc_report]
cpu = 2
memory = 'standard'
storage = '20G'

[popgen_genotyping.references]
fasta_ref_path = 'gs://cpg-common-main/references/hg38/v0/Homo_sapiens_assembly38.fasta'
bpm_manifest_path = 'gs://...'
egt_cluster_path = 'gs://...'
# Optional: population allele frequency reference for BAFRegress
# af_ref_path = 'gs://...'

# Cohort PLINK2 aggregate consumed by MergeWithReferencePanel. Typically the
# PGEN/PVAR/PSAM triplet produced by a prior `ExportCohortDatasets` run.
# MergeWithReferencePanel has no cpg-flow required_stages — it reads these
# paths directly from config, so any historical aggregate can be targeted
# without re-running the upstream pipeline.
[popgen_genotyping.references.cohort_aggregate]
pgen_path = 'gs://cpg-<dataset>-main/<sequencing_subdir>/popgen_genotyping/ExportCohortDatasets/<version>/<datestamp>_cohort.pgen'
pvar_path = 'gs://cpg-<dataset>-main/<sequencing_subdir>/popgen_genotyping/ExportCohortDatasets/<version>/<datestamp>_cohort.pvar'
psam_path = 'gs://cpg-<dataset>-main/<sequencing_subdir>/popgen_genotyping/ExportCohortDatasets/<version>/<datestamp>_cohort.psam'

# External reference panel (PLINK 1.9 fileset, pre-built upstream) consumed by
# MergeWithReferencePanel. The references repo owns producing this artifact;
# see https://github.com/populationgenomics/references for the source-of-truth.
[popgen_genotyping.references.reference_panel]
bed_path = 'gs://cpg-common-main/references/hgdp_1kg_v3.1.2/ref.bed'
bim_path = 'gs://cpg-common-main/references/hgdp_1kg_v3.1.2/ref.bim'
fam_path = 'gs://cpg-common-main/references/hgdp_1kg_v3.1.2/ref.fam'
panel_id = 'hgdp_1kg_v3.1.2'
# 'with_chr' (chr1..chrX) or 'no_chr' (1..X). The cohort is renamed to match.
expected_contig_style = 'with_chr'
# Extended regex (egrep) matching permitted variant IDs on both sides.
expected_variant_id_pattern = '^chr[0-9XYM]+:[0-9]+:[ACGT]+:[ACGT]+$'
